<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AutoPilot AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 380px; min-height: 540px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    color: #000;
    font-size: 13px;
    line-height: 1.5;
  }
  .header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 28px;
    height: 28px;
    border: 1px solid #000;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
  }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 10px; color: #666; }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
  }
  .status-dot.off { background: #999; box-shadow: none; }

  .hero {
    padding: 18px;
    border-bottom: 1px solid #000;
  }
  .hero-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 6px;
  }
  .hero-stat {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .hero-sub {
    margin-top: 6px;
    font-size: 11px;
    color: #666;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid #000;
  }
  .stat {
    padding: 12px 16px;
    border-right: 1px solid #000;
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .section {
    border-bottom: 1px solid #000;
    padding: 14px 18px;
  }
  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
  }
  .row + .row { border-top: 1px dashed #eee; }
  .row-label { color: #000; font-weight: 500; }
  .row-value { color: #666; font-size: 11px; }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .toggle-row + .toggle-row { border-top: 1px dashed #eee; }
  .toggle {
    width: 32px;
    height: 18px;
    border-radius: 9px;
    background: #ddd;
    position: relative;
    cursor: pointer;
    transition: background 150ms;
    flex-shrink: 0;
  }
  .toggle.on { background: #000; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 150ms;
  }
  .toggle.on::after { transform: translateX(14px); }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .btn {
    padding: 12px 14px;
    background: #fff;
    border: none;
    border-top: 1px solid #000;
    border-right: 1px solid #000;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 100ms;
  }
  .btn:hover { background: #f5f5f5; }
  .btn.primary { background: #000; color: #fff; }
  .btn.primary:hover { background: #222; }
  .btn:last-child { border-right: none; }

  .footer {
    padding: 12px 18px;
    text-align: center;
    font-size: 10px;
    color: #999;
  }
  .empty {
    text-align: center;
    color: #999;
    padding: 16px 0;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="logo">A</div>
      <div class="brand-text">
        <div class="brand-name">AutoPilot AI</div>
        <div class="brand-sub">Day 10 / 100 · 4-agent swarm</div>
      </div>
    </div>
    <div id="statusDot" class="status-dot"></div>
  </div>

  <div class="hero">
    <div class="hero-label">Total time saved</div>
    <div class="hero-stat" id="totalTime">0s</div>
    <div class="hero-sub" id="totalSub">No clicks yet — visit YouTube, Netflix, or any site</div>
  </div>

  <div class="grid">
    <div class="stat">
      <div class="stat-label">Auto-clicks</div>
      <div class="stat-value" id="totalClicks">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">This site</div>
      <div class="stat-value" id="thisSite">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Voice Control (say "skip", "pause", "next")</div>
    <div class="toggle-row">
      <span class="row-label">Voice commands</span>
      <div id="voiceToggle" class="toggle"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Categories</div>
    <div id="categoryList"></div>
  </div>

  <div class="section">
    <div class="section-title">Recent activity</div>
    <div id="recentList"><div class="empty">Nothing yet</div></div>
  </div>

  <div class="actions">
    <button id="undoBtn" class="btn">Undo Last</button>
    <button id="pauseSiteBtn" class="btn">Pause This Site</button>
    <button id="resetBtn" class="btn">Reset Stats</button>
    <button id="dashBtn" class="btn primary">Dashboard</button>
  </div>

  <div class="footer">100 Days · 100 AI Agents · by Sathish Lella</div>

  <script src="popup.js"></script>
</body>
</html>
